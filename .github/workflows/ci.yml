name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Go tests
        run: go test ./...
      - name: Build native plugin
        run: go build -trimpath -buildmode=c-shared -o dist/auth-inspect-linux-amd64.so .
      - name: ABI smoke test
        run: python abi_smoke_test.py dist/auth-inspect-linux-amd64.so
      - name: Install inspector dependencies
        run: python -m pip install -r inspector/requirements.txt
      - name: Python checks
        working-directory: inspector
        run: |
          python -m py_compile app.py
          python -m unittest -v
